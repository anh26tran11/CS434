59. Đánh giá khả năng một rủi ro nào đó có thể xảy ra cùng hậu quả và mức độ nghiêm trọng mà rủi ro này gây ra cho dự án được gọi là bước?|A. Phân tích rủi ro (Risk analysis)|B. Lập kế hoạch rủi ro (Risk planning)|C. Nhận diện rủi ro (Risk indentification)|D. Giám sát rủi ro (Risk monitoring)

        `;

        // Parse dữ liệu
        const questions = rawData.trim().split('\n').map((line, index) => {
            const parts = line.split('|');
            return {
                id: index,
                question: parts[0],
                options: [parts[1], parts[2], parts[3], parts[4]],
                answer: answerKeys[index]
            };
        });

        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswered = false;

        const container = document.getElementById('quiz-container');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        const resultDiv = document.getElementById('result');
        const scoreSpan = document.getElementById('score');

        function renderQuestion() {
            isAnswered = false;
            const q = questions[currentQuestionIndex];
            let optionsHtml = '';
            
            q.options.forEach((opt, optIndex) => {
                optionsHtml += `
                    <label class="option-label block relative cursor-pointer mb-3">
                        <input type="radio" name="question-${currentQuestionIndex}" value="${optIndex}" class="peer sr-only">
                        <span id="label-${currentQuestionIndex}-${optIndex}" class="block p-3 md:p-4 text-sm md:text-base border border-gray-200 rounded-lg text-gray-700 hover:bg-gray-50 transition">
                            ${opt}
                        </span>
                    </label>
                `;
            });

            container.innerHTML = `
                <div class="bg-white border rounded-xl p-4 md:p-5 shadow-sm" id="question-block-${currentQuestionIndex}">
                    <h3 class="text-base md:text-lg font-bold text-gray-800 mb-3 md:mb-4">Câu ${currentQuestionIndex + 1}/${questions.length}: ${q.question.replace(/^\d+\.\s*/, '')}</h3>
                    <div class="space-y-2">
                        ${optionsHtml}
                    </div>
                </div>
            `;

            submitBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');
            
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.innerText = "Xem kết quả";
            } else {
                nextBtn.innerText = "Tiếp theo";
            }
        }

        submitBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (isAnswered) return;

            const q = questions[currentQuestionIndex];
            const selected = document.querySelector(`input[name="question-${currentQuestionIndex}"]:checked`);
            
            if (!selected) {
                alert("Vui lòng chọn một đáp án!");
                return;
            }

            isAnswered = true;
            const selectedVal = parseInt(selected.value);
            
            // Cấm chọn lại
            document.querySelectorAll(`input[name="question-${currentQuestionIndex}"]`).forEach(input => {
                input.disabled = true;
            });

            const correctId = `label-${currentQuestionIndex}-${q.answer}`;
            const correctLabel = document.getElementById(correctId);
            correctLabel.parentElement.classList.add('correct-answer');

            if (selectedVal === q.answer) {
                score++;
            } else {
                const wrongLabel = document.getElementById(`label-${currentQuestionIndex}-${selectedVal}`);
                wrongLabel.parentElement.classList.add('wrong-answer');
            }

            submitBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
        });

        nextBtn.addEventListener('click', function(e) {
            e.preventDefault();
            
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                // Show result
                container.innerHTML = '';
                document.getElementById('button-container').classList.add('hidden');
                scoreSpan.innerText = score;
                resultDiv.classList.remove('hidden');
            }
        });

        // Initial render
        renderQuestion();
    </script>
</body>
</html>
